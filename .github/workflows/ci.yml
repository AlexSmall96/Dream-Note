name: CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
            echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> $GITHUB_ENV
            echo "SMTP_MAIL=${{ secrets.SMTP_MAIL }}" >> $GITHUB_ENV
            echo "SMTP_SERVICE=${{ secrets.SMTP_SERVICE }}" >> $GITHUB_ENV
            echo "API_KEY=${{ secrets.API_KEY }}" >> $GITHUB_ENV
            echo "MAIL_SLURP_API_KEY=${{ secrets.MAIL_SLURP_API_KEY }}" >> $GITHUB_ENV
            echo "DEV=${{ secrets.DEV }}" >> $GITHUB_ENV
            echo "GUEST_USER_ID=${{ secrets.GUEST_USER_ID }}" >> $GITHUB_ENV
            echo "GUEST_USER_EMAIL=${{ secrets.GUEST_USER_EMAIL }}" >> $GITHUB_ENV
            echo "RESET_TOKEN_SECRET=${{ secrets.RESET_TOKEN_SECRET }}" >> $GITHUB_ENV
           
      - name: Run backend tests
        env:
          DATABASE_URL: mongodb://root:example@localhost:27017
          DATABASE_NAME: dream-note-test
        run: npm run test:backend
        
      - name: Set frontend env vars
        run: echo "NEXT_PUBLIC_API_URL=http://localhost:3000/api" >> $GITHUB_ENV
        
      - name: Run frontend tests
        run: npm run test:frontend

      - name: Run coverage
        run: npm run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          
      - name: Build
        run: npm run build