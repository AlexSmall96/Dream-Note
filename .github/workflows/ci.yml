name: CI

on:
  push:
    branches: [ main, feature/**, fix/** ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> $GITHUB_ENV
          echo "SMTP_MAIL=${{ secrets.SMTP_MAIL }}" >> $GITHUB_ENV
          echo "SMTP_SERVICE=${{ secrets.SMTP_SERVICE }}" >> $GITHUB_ENV
          echo "API_KEY=${{ secrets.API_KEY }}" >> $GITHUB_ENV
          echo "MAIL_SLURP_API_KEY=${{ secrets.MAIL_SLURP_API_KEY }}" >> $GITHUB_ENV
          echo "DEV=${{ secrets.DEV }}" >> $GITHUB_ENV
          echo "GUEST_USER_ID=${{ secrets.GUEST_USER_ID }}" >> $GITHUB_ENV
          echo "GUEST_USER_EMAIL=${{ secrets.GUEST_USER_EMAIL }}" >> $GITHUB_ENV
          echo "RESET_TOKEN_SECRET=${{ secrets.RESET_TOKEN_SECRET }}" >> $GITHUB_ENV
          # Add more env vars here if needed

      - name: Run backend tests
        env:
          MONGO_URI: mongodb://localhost:27017
        run: npm run test:backend

      - name: Build
        run: npm run build